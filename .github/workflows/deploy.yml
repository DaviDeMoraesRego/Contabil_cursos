name: Deploy contabil-courses

on:
  push:
    branches:
      - master

jobs:
  deploy:
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      service-name: contabil-courses
      deployment-name: contabil-courses-deployment
      port: "10090"
    secrets:
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
      TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
